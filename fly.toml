# fly.toml app configuration file for legal-ai-saas-kalvi
# 简化方案：单体部署 + SQLite

app = 'legal-ai-saas-kalvi'
primary_region = 'sin'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 2
  memory_mb = 1024

# 持久化存储 - SQLite 数据
[mounts]
  source = 'legal_data'
  destination = '/app/data'
