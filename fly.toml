app = "legal-ai-saas-kalvi"
primary_region = "sin"

[build]
  dockerfile = "backend/Dockerfile.fly"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpus = 2
  memory_mb = 1024

# Volume for file storage (uploads)
[mounts]
  source = "legal_data"
  destination = "/app/data"