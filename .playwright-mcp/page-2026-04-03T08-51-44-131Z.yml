                    - generic [ref=e130]: "15"
                    - generic [ref=e132]: 为保护双方合法权益，本协议双方根据《中华人民共和国保守国家秘密法》《中华人民共和国民法典》《中华人民共和国反不正当竞争法》等相关法律、法规的规定，就保守秘密相关事宜在北京市大兴区达成如下协议：
                  - generic [ref=e133] [cursor=pointer]:
                    - generic [ref=e134]: "16"
                    - generic [ref=e136]: 第一条 本协议所称保密信息，系指与甲方有关、不为公众所知悉、能为权利人\授权持有人带来现时和\或潜在利益的任何资料和信息，其包括但不限于：
                  - generic [ref=e137] [cursor=pointer]:
                    - generic [ref=e138]: "17"
                    - generic [ref=e140]: （一）无论依附于何种载体的有关甲方的文件资料，包括但不限于北京大兴国际机场临空经济区国际会展消费功能区全球创意征集应征协议、北京大兴国际机场临空经济区国际会展消费功能区全球创意征集邀请函、北京大兴国际机场临空经济区国际会展消费功能区全球创意征集指引手册、乙方回复的应征确认函、乙方提交的填写后的应征申请函、授权委托书及联合体协议书（如有）及本协议，除此外还包括与北京大兴国际机场临空经济区国际会展消费功能区全球创意征集相关的上位规划、数据资料、图片信息、矢量文件等；
                  - generic [ref=e141] [cursor=pointer]:
                    - generic [ref=e142]: "18"
                    - generic [ref=e144]: （二）甲方的运营状况、财务状况、人员状况、与任何第三方的合作情况和涉及争议情况；
                  - generic [ref=e145] [cursor=pointer]:
                    - generic [ref=e146]: "19"
                    - generic [ref=e148]: （三）甲方业务资料中涉及的任何其他各方的情况；
                  - generic [ref=e149] [cursor=pointer]:
                    - generic [ref=e150]: "20"
                    - generic [ref=e152]: （四）为甲方提供的法律服务成果；
                  - generic [ref=e153] [cursor=pointer]:
                    - generic [ref=e154]: "21"
                    - generic [ref=e156]: （五）相关上级或行业主管机关的意见、批件或批示内容的部分或全部；
                  - generic [ref=e157] [cursor=pointer]:
                    - generic [ref=e158]: "22"
                    - generic [ref=e160]: （六）甲方和乙方就合作相关事宜签署的文件内容及进行磋商的进展，包括但不限于各方开出的条件、双方已经达成的协议和目前尚存的分歧等；
                  - generic [ref=e161] [cursor=pointer]:
                    - generic [ref=e162]: "23"
                    - generic [ref=e164]: （七）乙方根据、利用甲方提供的前述保密信息中的全部和\或某些部分信息而生成的信息。
                  - generic [ref=e165] [cursor=pointer]:
                    - generic [ref=e166]: "24"
                    - generic [ref=e168]: 第二条 乙方应对本协议第一条所述保密信息（以下简称“保密信息”）恪守保密义务。非经甲方书面同意，乙方不得向第三方泄露、给予或转让保密信息，不得编辑、改写后向第三方披露，不得将保密信息用于协议之外的目的，否则该行为将被视为已经构成了对本协议的违反。
                  - generic [ref=e169] [cursor=pointer]:
                    - generic [ref=e170]: "25"
                    - generic [ref=e172]: 第三条 无论本协议目的是否达成，如甲方提出要求，乙方应将载有甲方保密信息的任何文件、资料或软件及其备份，按甲方要求归还甲方，或予以销毁，并且不得继续使用这些保密信息。协议履行完毕，未经甲方的书面同意，乙方不得保存在履行协议过程中所获得或接触到的任何内部数据资料。
                  - generic [ref=e173] [cursor=pointer]:
                    - generic [ref=e174]: "26"
                    - generic [ref=e176]: 第四条 待甲乙双方正式签署保密协议后，甲方才发放指引手册的附录材料给乙方。
