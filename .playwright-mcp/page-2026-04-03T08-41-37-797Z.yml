                  - generic [ref=e297]: "15"
                  - generic [ref=e298]: 为保护双方合法权益，本协议双方根据《中华人民共和国保守国家秘密法》《中华人民共和国民法典》《中华人民共和国反不正当竞争法》等相关法律、法规的规定，就保守秘密相关事宜在北京市大兴区达成如下协议：
                - generic [ref=e299] [cursor=pointer]:
                  - generic [ref=e300]: "16"
                  - generic [ref=e301]: 第一条 本协议所称保密信息，系指与甲方有关、不为公众所知悉、能为权利人\授权持有人带来现时和\或潜在利益的任何资料和信息，其包括但不限于：
                - generic [ref=e302] [cursor=pointer]:
                  - generic [ref=e303]: "17"
                  - generic [ref=e304]: （一）无论依附于何种载体的有关甲方的文件资料，包括但不限于北京大兴国际机场临空经济区国际会展消费功能区全球创意征集应征协议、北京大兴国际机场临空经济区国际会展消费功能区全球创意征集邀请函、北京大兴国际机场临空经济区国际会展消费功能区全球创意征集指引手册、乙方回复的应征确认函、乙方提交的填写后的应征申请函、授权委托书及联合体协议书（如有）及本协议，除此外还包括与北京大兴国际机场临空经济区国际会展消费功能区全球创意征集相关的上位规划、数据资料、图片信息、矢量文件等；
                - generic [ref=e305] [cursor=pointer]:
                  - generic [ref=e306]: "18"
                  - generic [ref=e307]: （二）甲方的运营状况、财务状况、人员状况、与任何第三方的合作情况和涉及争议情况；
                - generic [ref=e308] [cursor=pointer]:
                  - generic [ref=e309]: "19"
                  - generic [ref=e310]: （三）甲方业务资料中涉及的任何其他各方的情况；
                - generic [ref=e311] [cursor=pointer]:
                  - generic [ref=e312]: "20"
                  - generic [ref=e313]: （四）为甲方提供的法律服务成果；
                - generic [ref=e314] [cursor=pointer]:
                  - generic [ref=e315]: "21"
                  - generic [ref=e316]: （五）相关上级或行业主管机关的意见、批件或批示内容的部分或全部；
                - generic [ref=e317] [cursor=pointer]:
                  - generic [ref=e318]: "22"
                  - generic [ref=e319]: （六）甲方和乙方就合作相关事宜签署的文件内容及进行磋商的进展，包括但不限于各方开出的条件、双方已经达成的协议和目前尚存的分歧等；
                - generic [ref=e320] [cursor=pointer]:
                  - generic [ref=e321]: "23"
                  - generic [ref=e322]: （七）乙方根据、利用甲方提供的前述保密信息中的全部和\或某些部分信息而生成的信息。
                - generic [ref=e323] [cursor=pointer]:
                  - generic [ref=e324]: "24"
                  - generic [ref=e325]: 第二条 乙方应对本协议第一条所述保密信息（以下简称“保密信息”）恪守保密义务。非经甲方书面同意，乙方不得向第三方泄露、给予或转让保密信息，不得编辑、改写后向第三方披露，不得将保密信息用于协议之外的目的，否则该行为将被视为已经构成了对本协议的违反。
                - generic [ref=e326] [cursor=pointer]:
                  - generic [ref=e327]: "25"
                  - generic [ref=e328]: 第三条 无论本协议目的是否达成，如甲方提出要求，乙方应将载有甲方保密信息的任何文件、资料或软件及其备份，按甲方要求归还甲方，或予以销毁，并且不得继续使用这些保密信息。协议履行完毕，未经甲方的书面同意，乙方不得保存在履行协议过程中所获得或接触到的任何内部数据资料。
                - generic [ref=e329] [cursor=pointer]:
                  - generic [ref=e330]: "26"
                  - generic [ref=e331]: 第四条 待甲乙双方正式签署保密协议后，甲方才发放指引手册的附录材料给乙方。
                - generic [ref=e332] [cursor=pointer]:
                  - generic [ref=e333]: "27"
                  - generic [ref=e334]: 第五条 乙方违约，应向甲方承担违约责任并赔偿违约行为给甲方造成的损失。但下述情况之一发生时，乙方对于相应的保密信息不再受本协议第二条所述义务的约束：
                - generic [ref=e335] [cursor=pointer]:
                  - generic [ref=e336]: "28"
                  - generic [ref=e337]: （一）甲方书面许可其向特定或不特定的第三方披露该等保密信息；
                - generic [ref=e338] [cursor=pointer]:
                  - generic [ref=e339]: "29"
                  - generic [ref=e340]: （二）在本协议生效之日或在其生效之后的任何时候，并非由于乙方本身原因，该等保密信息已经进入公知领域；
                - generic [ref=e341] [cursor=pointer]:
                  - generic [ref=e342]: "30"
                  - generic [ref=e343]: （三）乙方可以提供令甲方合理满意并信服的证明，显示在乙方向合同一方披露前合同一方已经知晓该等保密信息；
                - generic [ref=e344] [cursor=pointer]:
                  - generic [ref=e345]: "31"
                  - generic [ref=e346]: （四）在没有违反任何双方之间任何协议（包括本协议）或其他具有法律约束力的契约的前提下从第三方合法获取了该等保密信息；
                - generic [ref=e347] [cursor=pointer]:
                  - generic [ref=e348]: "32"
                  - generic [ref=e349]: （五）为保障应征协议的签订和履行，乙方在与其受委派而履行本协议或有途径从甲方处获知保密信息的全体人员（包括但不限于其出资人、雇员或其聘请的中介机构等）签订一份与本保密协议内容基本一致的保密协议后接触或使用该等保密信息的，但乙方及以上相关人员仍应采取一切合理措施对甲方的保密信息进行保密；
                - generic [ref=e350] [cursor=pointer]:
                  - generic [ref=e351]: "33"
