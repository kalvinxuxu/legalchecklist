version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - app
    networks:
      - legal-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
    networks:
      - legal-net
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/legal_saas
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - REDIS_URL=redis://redis:6379
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - chroma_data:/app/data/chroma
    depends_on:
      - db
      - redis
    networks:
      - legal-net
    restart: unless-stopped

  # Chroma 向量数据库（独立服务）
  chroma:
    image: ghcr.io/chroma-core/chroma:0.4.22
    volumes:
      - chroma_data:/chroma/chroma_data
    networks:
      - legal-net
    restart: unless-stopped
    # 如需 API 访问，可暴露端口
    # ports:
    #   - "8000:8000"

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=legal_saas
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - legal-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - legal-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  legal-net:
    driver: bridge
