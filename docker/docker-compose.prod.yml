# ============================================
# Legal AI SaaS - 生产环境 Docker Compose
# ============================================
# 使用方式:
#   1. 复制 .env.example 为 .env 并填写真实值
#   2. 将 SSL 证书放到 ./ssl/ 目录下 (cert.pem, key.pem)
#   3. 运行: docker-compose -f docker-compose.prod.yml up -d
# ============================================

version: '3.8'

services:
  # ============ 前端 Nginx ============
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_healthy
    networks:
      - legal-net
    restart: unless-stopped
    profiles:
      - frontend  # 只启动前端: docker-compose -f docker-compose.prod.yml up -d --profile frontend

  # ============ 反向代理 Nginx ============
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - app
    networks:
      - legal-net
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============ 后端应用 ============
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/legal_saas
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - REDIS_URL=redis://redis:6379
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - APP_ENV=production
      - LOG_LEVEL=info
    volumes:
      - chroma_data:/app/data/chroma
      - uploads_data:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - legal-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============ Chroma 向量数据库 ============
  chroma:
    image: ghcr.io/chroma-core/chroma:0.5.4
    volumes:
      - chroma_data:/chroma/chroma_data
    networks:
      - legal-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============ PostgreSQL 数据库 ============
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=legal_saas
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - legal-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============ Redis 缓存/队列 ============
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - legal-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============ 网络 ============
networks:
  legal-net:
    driver: bridge

# ============ 持久化卷 ============
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local
